<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yikun Impresiones - Comprobantes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
    --azul:#00A8E8;
    --azul-oscuro:#007EA7;
    --fucsia:#F72585;
    --amarillo:#FFD166;
    --verde:#06D6A0;
    --oscuro:#023047;
    --blanco:#ffffff;
}

*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,var(--azul),var(--azul-oscuro));
    color:white;
}

.header{
    text-align:center;
    padding:22px 0 8px;
}

.header img{
    width:170px;
    max-width:80%;
}

.app{
    display:flex;
    gap:18px;
    padding:18px;
    align-items:flex-start;
}

.panel,
.productos-panel{
    background:white;
    color:#111;
    padding:20px;
    border-radius:24px;
    box-shadow:0 12px 35px rgba(0,0,0,.25);
}

.panel{ width:390px; }
.productos-panel{ flex:1; }

h3{
    margin-top:0;
    color:var(--azul-oscuro);
}

label{
    font-weight:bold;
    font-size:14px;
}

input,select{
    width:100%;
    padding:14px;
    margin-top:6px;
    margin-bottom:14px;
    border:2px solid #e5e5e5;
    border-radius:14px;
    background:#f7f7f7;
    color:#111;
    font-size:16px;
    outline:none;
}

input:focus,
select:focus{
    border-color:var(--azul);
}

button{
    border:none;
    cursor:pointer;
    font-weight:bold;
    border-radius:16px;
    font-size:15px;
}

.btn{
    color:white;
    padding:15px;
    width:100%;
    margin-top:10px;
}

.azul{ background:var(--azul); }
.verde{ background:var(--verde); color:#003b2d; }
.fucsia{ background:var(--fucsia); }
.amarillo{ background:var(--amarillo); color:#111; }

.product-card{
    background:#f7f7f7;
    border:2px solid #eee;
    padding:14px;
    border-radius:18px;
    margin-bottom:12px;
}

.product-grid{
    display:grid;
    grid-template-columns:1fr 120px 150px 90px;
    gap:10px;
    align-items:end;
}

.btn-eliminar{
    background:var(--fucsia);
    color:white;
    padding:13px;
    width:100%;
}

.historial{
    margin-top:20px;
    background:#f7f7f7;
    padding:14px;
    border-radius:18px;
}

.item-historial{
    background:white;
    border:1px solid #ddd;
    padding:10px;
    border-radius:12px;
    margin-bottom:8px;
    font-size:13px;
}

#resultado{
    background:white;
    margin:20px auto;
    overflow:auto;
    max-width:100%;
}

/* HOJA A4 DOBLE */
.hoja-doble{
    width:210mm;
    height:297mm;
    background:white;
    color:black;
    padding:7mm;
    box-sizing:border-box;
}

.comprobante{
    width:100%;
    height:133mm;
    border:2px solid #111;
    padding:5mm;
    position:relative;
    overflow:hidden;
    box-sizing:border-box;
}

.linea-corte{
    border-top:2px dashed #999;
    margin:4mm 0;
}

.marca{
    position:absolute;
    top:4mm;
    right:5mm;
    background:var(--amarillo);
    color:#111;
    padding:4px 12px;
    border-radius:20px;
    font-weight:bold;
    font-size:13px;
}

.comp-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:4px solid var(--azul-oscuro);
    padding-bottom:7px;
}

.comp-logo img{
    width:90px;
}

.comp-titulo{
    text-align:center;
}

.comp-titulo h2{
    margin:0;
    font-size:22px;
    color:var(--azul-oscuro);
}

.comp-titulo p{
    margin:2px 0 0;
    font-size:11px;
}

.comp-numero{
    text-align:right;
    font-size:13px;
}

.datos{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
    margin-top:8px;
    font-size:12px;
}

.dato{
    border:1px solid #111;
    padding:5px;
}

.estado{
    font-weight:bold;
    color:var(--fucsia);
}

.tabla-productos{
    width:100%;
    border-collapse:collapse;
    margin-top:8px;
    font-size:12px;
}

.tabla-productos th{
    background:var(--azul-oscuro);
    color:white;
    border:1px solid #111;
    padding:5px;
}

.tabla-productos td{
    border:1px solid #111;
    padding:5px;
    text-align:center;
}

.totales{
    display:flex;
    justify-content:flex-end;
    margin-top:8px;
}

.caja-totales{
    width:78mm;
    border:2px solid #111;
    padding:6px;
    font-size:13px;
}

.linea-total{
    display:flex;
    justify-content:space-between;
    margin-bottom:4px;
}

.total-final{
    font-size:16px;
    font-weight:bold;
    color:var(--azul-oscuro);
    border-top:2px solid #111;
    padding-top:5px;
}

.pendiente{
    background:var(--amarillo);
    color:#111;
    padding:5px;
    border-radius:8px;
    font-size:17px;
    font-weight:bold;
}

.footer{
    margin-top:8px;
    display:flex;
    justify-content:space-between;
    font-size:10px;
    border-top:1px solid #111;
    padding-top:6px;
}

@media(max-width:768px){
    .app{
        flex-direction:column;
        padding:14px;
    }

    .panel,
    .productos-panel{
        width:100%;
    }

    .product-grid{
        grid-template-columns:1fr;
    }

    #resultado .hoja-doble{
        transform:scale(.45);
        transform-origin:top left;
    }
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png" alt="Logo Yikun">
</div>

<div class="app">

    <div class="panel">
        <h3>Datos del comprobante</h3>

        <label>Número de comprobante</label>
        <input type="number" id="numeroManual" min="1">

        <button class="btn fucsia" onclick="reiniciarNumero()">REINICIAR NUMERACIÓN</button>

        <label>Cliente</label>
        <input id="cliente" placeholder="Nombre del cliente">

        <label>CUIT / CUIL / DNI</label>
        <input id="dniCuil" placeholder="Ej: 20-12345678-9 o 12345678">

        <label>Vendedor</label>
        <select id="vendedor">
            <option value="03">03 Lucas A.Grafica</option>
            <option value="02">02 Analia A.Papeleria</option>
        </select>

        <label>Forma de pago</label>
        <select id="formaPago">
            <option>Efectivo</option>
            <option>Transferencia</option>
            <option>Mercado Pago</option>
            <option>Tarjeta</option>
            <option>Cuenta corriente</option>
        </select>

        <label>Estado del trabajo</label>
        <select id="estadoTrabajo">
            <option>Pendiente</option>
            <option>En producción</option>
            <option>Terminado</option>
            <option>Entregado</option>
            <option>Cancelado</option>
        </select>

        <label>Seña</label>
        <input type="number" id="sena" value="0" min="0">

        <label>Descuento %</label>
        <input type="number" id="descuento" value="0" min="0" max="100">

        <button class="btn azul" onclick="generar()">GENERAR COMPROBANTE</button>
        <button class="btn verde" onclick="imprimirComprobante()">IMPRIMIR</button>
        <button class="btn azul" onclick="guardarPDF()">GUARDAR PDF</button>
        <button class="btn verde" onclick="compartirWhatsApp()">COMPARTIR POR WHATSAPP</button>

        <div class="historial">
            <h3>Últimos 5 comprobantes</h3>
            <div id="listaHistorial"></div>
        </div>
    </div>

    <div class="productos-panel">
        <h3>Productos</h3>

        <div id="productos">
            <div class="product-card">
                <div class="product-grid">
                    <div>
                        <label>Detalle</label>
                        <input class="detalle" placeholder="Producto">
                    </div>
                    <div>
                        <label>Cantidad</label>
                        <input class="cantidad" type="number" value="1" min="1">
                    </div>
                    <div>
                        <label>Precio</label>
                        <input class="precio" type="number" value="0" min="0">
                    </div>
                    <div>
                        <button class="btn-eliminar" onclick="eliminarProducto(this)">X</button>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn amarillo" onclick="agregarProducto()">AGREGAR PRODUCTO</button>
    </div>

</div>

<div id="resultado"></div>

<script>
let numero = localStorage.getItem("numeroYikun");
numero = numero ? parseInt(numero, 10) : 1;
document.getElementById("numeroManual").value = numero;

function formatoARS(num){
    return "$ " + num.toLocaleString("es-AR", {
        minimumFractionDigits:0,
        maximumFractionDigits:2
    });
}

function escaparHTML(texto){
    return texto
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
}

function agregarProducto(){
    let contenedor = document.getElementById("productos");

    let div = document.createElement("div");
    div.className = "product-card";

    div.innerHTML = `
        <div class="product-grid">
            <div>
                <label>Detalle</label>
                <input class="detalle" placeholder="Producto">
            </div>
            <div>
                <label>Cantidad</label>
                <input class="cantidad" type="number" value="1" min="1">
            </div>
            <div>
                <label>Precio</label>
                <input class="precio" type="number" value="0" min="0">
            </div>
            <div>
                <button class="btn-eliminar" onclick="eliminarProducto(this)">X</button>
            </div>
        </div>
    `;

    contenedor.appendChild(div);
}

function eliminarProducto(boton){
    let productos = document.querySelectorAll(".product-card");

    if(productos.length <= 1){
        alert("Debe quedar al menos un producto.");
        return;
    }

    boton.closest(".product-card").remove();
}

function reiniciarNumero(){
    let nuevo = prompt("Ingrese el nuevo número inicial:", "1");

    if(nuevo === null) return;

    nuevo = parseInt(nuevo, 10);

    if(isNaN(nuevo) || nuevo <= 0){
        alert("Número inválido.");
        return;
    }

    numero = nuevo;
    localStorage.setItem("numeroYikun", numero);
    document.getElementById("numeroManual").value = numero;
}

function obtenerVendedor(){
    let vendedor = document.getElementById("vendedor").value;

    if(vendedor === "03"){
        return {
            nombre:"03 Lucas A.Grafica",
            datos:"Salta - Ayacucho 1621 / Cel: 3876340685"
        };
    }

    return {
        nombre:"02 Analia A.Papeleria",
        datos:"Salta - Ayacucho 1621 / Cel: 3872254054"
    };
}

function generar(){
    let numeroManual = parseInt(document.getElementById("numeroManual").value, 10);

    if(isNaN(numeroManual) || numeroManual <= 0){
        alert("Ingrese un número de comprobante válido.");
        return;
    }

    numero = numeroManual;

    let cliente = document.getElementById("cliente").value.trim();
    let dniCuil = document.getElementById("dniCuil").value.trim();

    if(cliente === ""){
        alert("Ingrese cliente.");
        return;
    }

    let detalles = document.querySelectorAll(".detalle");
    let cantidades = document.querySelectorAll(".cantidad");
    let precios = document.querySelectorAll(".precio");

    let total = 0;
    let filas = "";

    for(let i=0; i<detalles.length; i++){
        let detalle = detalles[i].value.trim();

        if(detalle !== ""){
            let cant = Number(cantidades[i].value);
            let precio = Number(precios[i].value);

            if(cant <= 0 || precio < 0 || isNaN(cant) || isNaN(precio)){
                alert("Revise cantidades y precios.");
                return;
            }

            let subtotal = cant * precio;
            total += subtotal;

            filas += `
                <tr>
                    <td>${escaparHTML(detalle)}</td>
                    <td>${cant}</td>
                    <td>${formatoARS(precio)}</td>
                    <td>${formatoARS(subtotal)}</td>
                </tr>
            `;
        }
    }

    if(total === 0){
        alert("Agregue productos.");
        return;
    }

    let sena = Number(document.getElementById("sena").value);
    let descuento = Number(document.getElementById("descuento").value);

    if(isNaN(sena) || sena < 0){
        alert("La seña no puede ser negativa.");
        return;
    }

    if(isNaN(descuento) || descuento < 0 || descuento > 100){
        alert("El descuento debe estar entre 0 y 100.");
        return;
    }

    let descuentoMonto = total * (descuento / 100);
    let totalFinal = total - descuentoMonto;

    if(sena > totalFinal){
        alert("La seña no puede ser mayor al total final.");
        return;
    }

    let pendiente = totalFinal - sena;
    let fecha = new Date().toLocaleDateString("es-AR");
    let numeroFormateado = numero.toString().padStart(6, "0");
    let vendedor = obtenerVendedor();
    let formaPago = document.getElementById("formaPago").value;
    let estadoTrabajo = document.getElementById("estadoTrabajo").value;

    let comprobanteContenido = `
        <div class="comp-header">
            <div class="comp-logo">
                <img src="logo.png" alt="Logo Yikun">
            </div>

            <div class="comp-titulo">
                <h2>COMPROBANTE</h2>
                <p>Yikun Impresiones</p>
            </div>

            <div class="comp-numero">
                <b>N° C ${numeroFormateado}</b><br>
                Fecha: ${fecha}
            </div>
        </div>

        <div class="datos">
            <div class="dato">Cliente: <b>${escaparHTML(cliente)}</b></div>
            <div class="dato">CUIT / CUIL / DNI: <b>${escaparHTML(dniCuil || "-")}</b></div>
            <div class="dato">Vendedor: <b>${vendedor.nombre}</b></div>
            <div class="dato">Forma de pago: <b>${formaPago}</b></div>
            <div class="dato">Estado: <span class="estado">${estadoTrabajo}</span></div>
        </div>

        <table class="tabla-productos">
            <tr>
                <th>Detalle</th>
                <th>Cantidad</th>
                <th>Precio Unit.</th>
                <th>Subtotal</th>
            </tr>
            ${filas}
        </table>

        <div class="totales">
            <div class="caja-totales">
                <div class="linea-total">
                    <span>Subtotal:</span>
                    <b>${formatoARS(total)}</b>
                </div>

                <div class="linea-total total-final">
                    <span>Total final:</span>
                    <span>${formatoARS(totalFinal)}</span>
                </div>

                <div class="linea-total">
                    <span>Seña:</span>
                    <b>${formatoARS(sena)}</b>
                </div>

                <div class="linea-total pendiente">
                    <span>Saldo:</span>
                    <span>${formatoARS(pendiente)}</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <div>
                ${vendedor.nombre}<br>
                ${vendedor.datos}
            </div>
            <div>
                Gracias por confiar en Yikun Impresiones
            </div>
        </div>
    `;

    let hoja = `
        <div class="hoja-doble">
            <div class="comprobante">
                <div class="marca">ORIGINAL</div>
                ${comprobanteContenido}
            </div>

            <div class="linea-corte"></div>

            <div class="comprobante">
                <div class="marca">COPIA</div>
                ${comprobanteContenido}
            </div>
        </div>
    `;

    document.getElementById("resultado").innerHTML = hoja;

    guardarHistorial({
        numero: numeroFormateado,
        cliente: cliente,
        dniCuil: dniCuil,
        fecha: fecha,
        total: formatoARS(totalFinal),
        estado: estadoTrabajo,
        pago: formaPago
    });
}

function guardarPDF(){
    let elemento = document.getElementById("resultado");

    if(elemento.innerHTML.trim() === ""){
        alert("Primero genere un comprobante.");
        return;
    }

    let opt = {
        margin:0,
        filename:"Comprobante_Yikun.pdf",
        image:{ type:"jpeg", quality:1 },
        html2canvas:{ scale:2 },
        jsPDF:{ unit:"mm", format:"a4", orientation:"portrait" }
    };

    html2pdf().set(opt).from(elemento).save().then(() => {
        numero++;
        localStorage.setItem("numeroYikun", numero);
        document.getElementById("numeroManual").value = numero;
    });
}

function imprimirComprobante(){
    let contenido = document.getElementById("resultado").innerHTML;

    if(contenido.trim() === ""){
        alert("Primero genere un comprobante.");
        return;
    }

    let ventana = window.open("", "_blank");

    ventana.document.write(`
        <!DOCTYPE html>
        <html lang="es">
        <head>
            <meta charset="UTF-8">
            <title>Imprimir comprobante</title>
            <style>
                ${document.querySelector("style").innerHTML}

                body{
                    background:white;
                    margin:0;
                }

                .header,
                .app,
                #resultado{
                    display:none;
                }

                @page{
                    size:A4 portrait;
                    margin:0;
                }
            </style>
        </head>
        <body>
            ${contenido}
            <script>
                window.onload = function(){
                    window.print();
                }
            <\/script>
        </body>
        </html>
    `);

    ventana.document.close();
}

function compartirWhatsApp(){
    if(document.getElementById("resultado").innerHTML.trim() === ""){
        alert("Primero genere el comprobante.");
        return;
    }

    let cliente = document.getElementById("cliente").value.trim().toUpperCase();
    let numeroComprobante = document.getElementById("numeroManual").value.toString().padStart(6, "0");
    let formaPago = document.getElementById("formaPago").value;
    let estadoTrabajo = document.getElementById("estadoTrabajo").value;

    let mensaje =
        `*Hola* ${cliente}\n` +
        `Te compartimos los datos de tu pedido\n\n` +
        `*Comprobante N°*: C ${numeroComprobante}\n` +
        `*Estado del Trabajo*: ${estadoTrabajo}\n` +
        `*Forma de Pago*: ${formaPago}\n\n` +
        `Muchas gracias por confiar en Yikun Impresiones.`;

    let url = "https://wa.me/?text=" + encodeURIComponent(mensaje);
    window.open(url, "_blank");
}

function guardarHistorial(item){
    let historial = JSON.parse(localStorage.getItem("historialYikun")) || [];

    historial.unshift(item);
    historial = historial.slice(0, 5);

    localStorage.setItem("historialYikun", JSON.stringify(historial));
    mostrarHistorial();
}

function mostrarHistorial(){
    let historial = JSON.parse(localStorage.getItem("historialYikun")) || [];
    let lista = document.getElementById("listaHistorial");

    if(historial.length === 0){
        lista.innerHTML = "<p>No hay comprobantes todavía.</p>";
        return;
    }

    lista.innerHTML = historial.map(item => `
        <div class="item-historial">
            <b>C ${item.numero}</b> - ${item.fecha}<br>
            Cliente: ${escaparHTML(item.cliente)}<br>
            CUIT/CUIL/DNI: ${escaparHTML(item.dniCuil || "-")}<br>
            Total: <b>${item.total}</b><br>
            Estado: ${item.estado}<br>
            Pago: ${item.pago}
        </div>
    `).join("");
}

mostrarHistorial();
</script>

</body>
</html>
